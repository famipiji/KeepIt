<!DOCTYPE html>
<html lang="en">
<link rel="icon" type="image/png" href="img/favicon.png" />
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-card {
      background: #ffffff;
      padding: 48px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 {
      text-align: center;
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .login-card p.subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .error-msg {
      display: none;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 18px;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover {
      background: #4338ca;
    }

    .btn-login:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>

    <div class="error-msg" id="errorMsg">Invalid username or password.</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>

  <script>
    const USERS = [
      { username: 'user', password: '123' }
    ];

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const match = USERS.find(u => u.username === username && u.password === password);

      if (match) {
        sessionStorage.setItem('loggedInUser', username);
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.style.display = 'block';
      }
    });

    // Hide error when user starts typing again
    document.getElementById('username').addEventListener('input', () => errorMsg.style.display = 'none');
    document.getElementById('password').addEventListener('input', () => errorMsg.style.display = 'none');
  </script>
</body>
</html>
